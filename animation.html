<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>環保動畫</title>

<style>
body{
  font-family:"Noto Sans TC";
  background:#e8f5e9;
  text-align:center;
  padding-top:40px;
}

/* 標題 */
h2{
  margin-bottom:20px;
  color:#2e7d32;
}

/* 影片 */
iframe{
  width:300px;
  height:180px;
  margin:10px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

/* ⭐ 按鈕區（跟其他頁一樣） */
.btn-group{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}

/* ⭐ 按鈕樣式 */
.btn{
  padding:12px 30px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  font-size:1rem;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  text-decoration:none;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-3px);
}

/* 回首頁（綠色） */
.back{
  background:#66bb6a;
  color:white;
}

/* 上一頁（白色） */
.prev{
  background:white;
  color:#2e7d32;
  border:2px solid #66bb6a;
}
</style>
</head>

<body>

<h2>🎬 環保動畫</h2>

<iframe src="https://www.youtube.com/embed/影片ID1"></iframe>
<iframe src="https://www.youtube.com/embed/影片ID2"></iframe>

<!-- ⭐ 按鈕（跟其他頁一致） -->
<div class="btn-group">
  <button class="btn back" onclick="location.href='index.html'">回首頁</button>
</div>

</body>
</html>
