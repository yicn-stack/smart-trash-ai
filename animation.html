<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>環保動畫</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:"Noto Sans TC";
  background:#e8f5e9;
  text-align:center;
  padding-top:40px;
}

/* 標題 */
h2{
  margin-bottom:20px;
  color:#2e7d32;
}

/* 影片區 */
.video-group{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

/* 單個影片卡 */
.video-box{
  position:relative;
}

/* iframe */
iframe{
  width:320px;
  height:190px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

/* ⭐ 全螢幕按鈕 */
.full-btn{
  position:absolute;
  bottom:8px;
  right:8px;
  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  font-size:0.8rem;
  cursor:pointer;
}

/* ⭐ 手機版 */
@media (max-width:768px){
  .video-group{
    flex-direction:column;
    align-items:center;
  }

  iframe{
    width:90%;
    height:220px;
  }
}

/* ⭐ 彈窗（全螢幕） */
#videoModal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#videoModal iframe{
  width:90%;
  height:80%;
  border-radius:12px;
}

/* 按鈕 */
.btn-group{
  margin-top:30px;
}

.btn{
  padding:12px 30px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  font-size:1rem;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.back{
  background:#66bb6a;
  color:white;
}
</style>
</head>

<body>

<h2>🎬 環保動畫</h2>

<div class="video-group">

  <div class="video-box">
    <iframe src=https://www.youtube.com/watch?v=P8Xwb3U9bRM"></iframe>
    <button class="full-btn" onclick="openVideo('影片ID1')">全螢幕</button>
  </div>

  <div class="video-box">
    <iframe src="https://www.youtube.com/watch?v=3J-CeLBR6bU"></iframe>
    <button class="full-btn" onclick="openVideo('影片ID2')">全螢幕</button>
  </div>

</div>

<!-- ⭐ 彈窗 -->
<div id="videoModal" onclick="closeVideo()">
  <iframe id="modalVideo" src=""></iframe>
</div>

<div class="btn-group">
  <button class="btn back" onclick="location.href='index.html'">回首頁</button>
</div>

<script>
function openVideo(id){
  const modal = document.getElementById("videoModal");
  const video = document.getElementById("modalVideo");

  video.src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
  modal.style.display = "flex";
}

function closeVideo(){
  const modal = document.getElementById("videoModal");
  const video = document.getElementById("modalVideo");

  modal.style.display = "none";
  video.src = ""; // 停止播放
}
</script>

</body>
</html>
