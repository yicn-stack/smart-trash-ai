<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>環保動畫</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:"Noto Sans TC";
  background:#e8f5e9;
  text-align:center;
  padding-top:40px;
}

/* 標題 */
h2{
  color:#2e7d32;
  margin-bottom:25px;
}

/* ⭐ 卡片區 */
.video-group{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

/* ⭐ 卡片 */
.video-card{
  width:300px;
  border-radius:16px;
  overflow:hidden;
  background:white;
  box-shadow:0 6px 15px rgba(0,0,0,.15);
  cursor:pointer;
  transition:.3s;
}

.video-card:hover{
  transform:translateY(-5px);
}

/* 縮圖 */
.video-card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

/* 文字 */
.video-title{
  padding:10px;
  font-size:1rem;
  color:#2e7d32;
  font-weight:bold;
}

/* 按鈕 */
.btn-group{
  margin-top:30px;
}

.btn{
  padding:12px 30px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  font-size:1rem;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.back{
  background:#66bb6a;
  color:white;
}

/* ⭐ 手機版 */
@media (max-width:768px){
  .video-card{
    width:90%;
  }
}
</style>
</head>

<body>

<h2>🎬 環保動畫</h2>

<div class="video-group">

  <!-- 卡片1 -->
  <a href="https://youtu.be/P8Xwb3U9bRM=影片ID1" target="_blank" class="video-card">
    <img src="https://img.youtube.com/vi/影片1/0.jpg">
    <div class="video-title">環保動畫 1</div>
  </a>

  <!-- 卡片2 -->
  <a href="https://youtu.be/3J-CeLBR6bU\=影片ID2" target="_blank" class="video-card">
    <img src="https://img.youtube.com/vi/影片2/0.jpg">
    <div class="video-title">環保動畫 2</div>
  </a>

</div>

<div class="btn-group">
  <button class="btn back" onclick="location.href='index.html'">回首頁</button>
</div>

</body>
</html>
