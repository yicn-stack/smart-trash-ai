<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾減量 Tips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Noto Sans TC",sans-serif;
  background:#f1f8e9;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 標題 */
#header{
  width:100%;
  background:#66bb6a;
  color:white;
  text-align:center;
  padding:15px;
  font-size:1.5rem;
}

/* 容器 */
.container{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

/* 卡片 */
.flip-card{
  width:230px;
  height:280px;
  perspective:1000px;
}

.flip-inner{
  width:100%;
  height:100%;
  transition:transform .6s;
  transform-style:preserve-3d;
  position:relative;
}

.flip-inner.active{
  transform:rotateY(180deg);
}

/* 正反面 */
.flip-front,.flip-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:16px;
  backface-visibility:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,.15);
}

/* 正面（文字） */
.flip-front{
  background:white;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
}

.flip-front h3{
  color:#2e7d32;
  margin-bottom:10px;
}

.flip-front p{
  color:#555;
  font-size:0.9rem;
}

/* 背面（圖片） */
.flip-back{
  background:white;
  transform:rotateY(180deg);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

.flip-back img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  cursor:pointer;
}

/* 圖片放大 */
#imgModal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

#imgModal img{
  width:90%;
  max-width:600px;
  border-radius:10px;
}

/* 按鈕 */
.btn{
  margin:20px 10px;
  padding:10px 25px;
  border-radius:25px;
  border:none;
  cursor:pointer;
}

.back{background:#66bb6a;color:white;}
.prev{background:white;color:#2e7d32;border:2px solid #66bb6a;}

</style>
</head>

<body>

<div id="header">🌱 垃圾減量 Tips（點擊卡片）</div>

<div class="container">

<!-- 卡片1 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <h3>自備餐具</h3>
      <p>點擊查看更多</p>
    </div>
    <div class="flip-back">
      <img src="model/餐具.png">
      <p>減少一次性餐具使用</p>
    </div>
  </div>
</div>

<!-- 卡片2 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <h3>自備飲料杯</h3>
      <p>環保又省錢</p>
    </div>
    <div class="flip-back">
      <img src="model/tip2.png">
    </div>
  </div>
</div>

</div>

<!-- 放大圖片 -->
<div id="imgModal">
  <img id="modalImg">
</div>

<!-- 按鈕 -->
<button class="btn prev" onclick="history.back()">回上一頁</button>
<button class="btn back" onclick="location.href='index.html'">回首頁</button>

<script>

// 翻牌
document.querySelectorAll(".flip-card").forEach(card=>{
  card.addEventListener("click",()=>{
    card.querySelector(".flip-inner").classList.toggle("active");
  });
});

// 圖片放大
const modal=document.getElementById("imgModal");
const modalImg=document.getElementById("modalImg");

document.querySelectorAll(".flip-back img").forEach(img=>{
  img.addEventListener("click",(e)=>{
    e.stopPropagation(); // 防止翻牌
    modal.style.display="flex";
    modalImg.src=img.src;
  });
});

modal.addEventListener("click",()=>{
  modal.style.display="none";
});

</script>

</body>
</html>
