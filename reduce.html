<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾減量 Tips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Noto Sans TC",sans-serif;
  background:#f1f8e9;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 標題 */
#header{
  width:100%;
  background:#66bb6a;
  color:white;
  text-align:center;
  padding:15px;
  font-size:1.5rem;
}

/* 容器 */
.container{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

/* ⭐ 卡片固定 */
.flip-card{
  width:270px;
  height:320px; /* ⭐ 固定高度 */
  perspective:1000px;
  position:relative;
}

/* ⭐ 內層固定 */
.flip-inner{
  width:100%;
  height:100%;
  position:absolute;
  top:0;
  left:0;
  transition:transform .6s;
  transform-style:preserve-3d;
}

.flip-inner.active{
  transform:rotateY(180deg);
}

/* 正反面 */
.flip-front,.flip-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:16px;
  backface-visibility:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,.15);
  overflow:hidden;
}

/* 正面 */
.flip-front{
  position:relative;
}

.flip-front img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 文字 */
.front-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  color:SeaGreen;
  font-size:1.3rem;
  font-weight:bold;
}

.front-text span{
  display:block;
  font-size:0.9rem;
  margin-top:6px;
}

/* ⭐ 背面（完全固定） */
.flip-back{
  background:white;
  transform:rotateY(180deg);
  display:flex;
  flex-direction:column;
  padding:10px;
}

/* ⭐ 圖片（填滿！） */
.flip-back img{
  width:100%;
  height:65%;  /* ⭐ 圖片佔大部分 */
  object-fit:cover; /* ⭐ 關鍵：填滿 */
  cursor:pointer;
  border-radius:10px;
}

/* ⭐ 文字區固定 */
.back-text{
  height:35%;
  font-size:0.85rem;
  color:#33691e;
  line-height:1.4;
  overflow:auto;
  padding-top:5px;
}

/* 放大圖片 */
#imgModal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

#imgModal img{
  width:90%;
  max-width:600px;
  border-radius:10px;
}

/* 按鈕 */
.btn-group{
  display:flex;
  gap:20px;
  margin:25px 0;
}

.btn{
  padding:12px 30px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  font-size:1rem;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.back{background:#66bb6a;color:white;}
.prev{background:white;color:#2e7d32;border:2px solid #66bb6a;}

</style>
</head>

<body>

<div id="header">🌱 垃圾減量 Tips</div>

<div class="container">

<!-- 卡片1 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/11.png">
      <div class="front-text">自備餐具<span>點擊查看</span></div>
    </div>
    <div class="flip-back">
      <img src="model/餐具.png">
      <div class="back-text">
        🌱 用餐時自備筷子、湯匙與吸管，可大幅減少一次性餐具的使用。
      </div>
    </div>
  </div>
</div>

<!-- 卡片2 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/22.png">
      <div class="front-text">自備飲料杯<span>點擊查看</span></div>
    </div>
    <div class="flip-back">
      <img src="model/環保杯.png">
      <div class="back-text">
        🌱 自備環保杯可享折扣，環保又省錢！
      </div>
    </div>
  </div>
</div>

<!-- 卡片3 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/33.png">
      <div class="front-text">減少包裝<span>點擊查看</span></div>
    </div>
    <div class="flip-back">
      <img src="model/包裝.png">
      <div class="back-text">
        🌱 選擇簡單包裝或自備購物袋。
      </div>
    </div>
  </div>
</div>

<!-- 卡片4 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/44.png">
      <div class="front-text">避免一次性<span>點擊查看</span></div>
    </div>
    <div class="flip-back">
      <img src="model/一次性.png">
      <div class="back-text">
        🌱 使用可重複餐盒，減少塑膠垃圾。
      </div>
    </div>
  </div>
</div>

<!-- 卡片5 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/55.png">
      <div class="front-text">補充式商品<span>點擊查看</span></div>
    </div>
    <div class="flip-back">
      <img src="model/可補充.png">
      <div class="back-text">
        🌱 選擇補充包商品，減少塑膠瓶浪費。
      </div>
    </div>
  </div>
</div>

<!-- 卡片6 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/66.png">
      <div class="front-text">物品再利用<span>點擊查看</span></div>
    </div>
    <div class="flip-back">
      <img src="model/再利用.png">
      <div class="back-text">
        🌱 紙袋、瓶罐可重複使用，延長物品壽命。
      </div>
    </div>
  </div>
</div>

</div>

<!-- 放大 -->
<div id="imgModal">
  <img id="modalImg">
</div>

<!-- 按鈕 -->
<div class="btn-group">
  <button class="btn prev" onclick="history.back()">回上一頁</button>
  <button class="btn back" onclick="location.href='index.html'">回首頁</button>
</div>

<script>

// 翻牌
document.querySelectorAll(".flip-card").forEach(card=>{
  card.addEventListener("click",()=>{
    card.querySelector(".flip-inner").classList.toggle("active");
  });
});

// 放大
const modal=document.getElementById("imgModal");
const modalImg=document.getElementById("modalImg");

document.querySelectorAll(".flip-back img").forEach(img=>{
  img.addEventListener("click",(e)=>{
    e.stopPropagation();
    modal.style.display="flex";
    modalImg.src=img.src;
  });
});

modal.addEventListener("click",()=>{
  modal.style.display="none";
});

</script>

</body>
</html>
