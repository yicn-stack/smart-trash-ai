<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾減量 Tips</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Noto Sans TC",sans-serif;
  background:#f1f8e9;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 標題 */
#header{
  width:100%;
  background:#66bb6a;
  color:white;
  text-align:center;
  padding:15px;
  font-size:1.5rem;
}

/* 容器 */
.container{
  margin-top:20px;
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

/* 卡片 */
.flip-card{
  width:270px;
  height:360px;
  perspective:1000px;
}

.flip-inner{
  width:100%;
  height:100%;
  transition:transform .6s;
  transform-style:preserve-3d;
  position:relative;
}

.flip-inner.active{
  transform:rotateY(180deg);
}

/* 正反面 */
.flip-front,.flip-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:16px;
  backface-visibility:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,.15);
}

/* 正面 */
.flip-front{
  background:white;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
}

.flip-front h3{
  color:#2e7d32;
  margin-bottom:10px;
}

.flip-front p{
  color:#555;
  font-size:0.9rem;
}

/* 背面（⭐已優化排版） */
.flip-back{
  background:white;
  transform:rotateY(180deg);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:12px;
  text-align:center;
}

/* 圖片 */
.flip-back img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  cursor:pointer;
  margin-bottom:10px;
  border-radius:10px;
  background:#f5f5f5;
  padding:8px;
}

/* 文字 */
.back-text{
  font-size:0.9rem;
  color:#33691e;
  line-height:1.4;
}

/* 圖片放大 */
#imgModal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

#imgModal img{
  width:90%;
  max-width:600px;
  border-radius:10px;
}

/* ⭐ 按鈕區（左右並排） */
.btn-group{
  display:flex;
  gap:20px;
  margin:25px 0;
}

/* 按鈕 */
.btn{
  padding:12px 30px;
  border-radius:25px;
  border:none;
  cursor:pointer;
  font-size:1rem;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  transition:.3s;
}

.btn:hover{
  transform:translateY(-3px);
}

.back{background:#66bb6a;color:white;}
.prev{background:white;color:#2e7d32;border:2px solid #66bb6a;}

</style>
</head>

<body>

<div id="header">🌱 垃圾減量 Tips</div>

<div class="container">

<!-- 卡片1 -->
<div class="flip-card">
  <div class="flip-inner">
    
    <div class="flip-front">
      <h3>自備餐具</h3>
      <p>點擊查看更多</p>
    </div>

    <div class="flip-back">
      <img src="model/餐具.png">
      <div class="back-text">
        🌱用餐時自備筷子、湯匙與吸管，可大幅減少一次性餐具的使用。
      </div>
    </div>

  </div>
</div>

<!-- 卡片2 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <h3>自備飲料杯</h3>
      <p>點擊查看更多</p>
    </div>

    <div class="flip-back">
      <img src="model/環保杯.png">
      <div class="back-text">
        🌱購買飲料可自備環保杯，多數飲料店還會提供折扣，環保又省錢！

      </div>
    </div>

  </div>
</div>

  <!-- 卡片3 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <h3>減少過度包裝</h3>
      <p>點擊查看更多</p>
    </div>

    <div class="flip-back">
      <img src="model/包裝.png">
      <div class="back-text">
        🌱  選擇簡單包裝商品或自備購物袋，減少不必要的垃圾產生。

      </div>
    </div>

  </div>
</div>

  <!-- 卡片4 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <h3>避免使用一次性容器</h3>
      <p>點擊查看更多</p>
    </div>

    <div class="flip-back">
      <img src="model/一次性.png">
      <div class="back-text">
        🌱 常備可重複使用的餐盒、保鮮盒，外帶時也能拒絕一次性塑膠。

      </div>
    </div>

  </div>
</div>

  <!-- 卡片5 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <h3>選購可補充式商品</h3>
      <p>點擊查看更多</p>
    </div>

    <div class="flip-back">
      <img src="model/可補充.png">
      <div class="back-text">
        🌱盡量選擇可補充包的清潔用品、洗髮精、沐浴乳，減少塑膠瓶浪費。


      </div>
    </div>

  </div>
</div>

  <!-- 卡片6 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <h3>物品再利用</h3>
      <p>點擊查看更多</p>
    </div>

    <div class="flip-back">
      <img src="model/再利用.png">
      <div class="back-text">
        🌱  紙袋、瓶罐、紙箱都可再利用，讓物品的壽命延長。

      </div>
    </div>

  </div>
</div>

</div>

<!-- 放大圖片 -->
<div id="imgModal">
  <img id="modalImg">
</div>

<!-- ⭐ 按鈕左右並排 -->
<div class="btn-group">
  <button class="btn prev" onclick="history.back()">回上一頁</button>
  <button class="btn back" onclick="location.href='index.html'">回首頁</button>
</div>

<script>

// 翻牌
document.querySelectorAll(".flip-card").forEach(card=>{
  card.addEventListener("click",()=>{
    card.querySelector(".flip-inner").classList.toggle("active");
  });
});

// 圖片放大
const modal=document.getElementById("imgModal");
const modalImg=document.getElementById("modalImg");

document.querySelectorAll(".flip-back img").forEach(img=>{
  img.addEventListener("click",(e)=>{
    e.stopPropagation();
    modal.style.display="flex";
    modalImg.src=img.src;
  });
});

modal.addEventListener("click",()=>{
  modal.style.display="none";
});

</script>

</body>
</html>
