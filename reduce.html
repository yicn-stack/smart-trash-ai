<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾減量 Tips｜Smart Trash AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Noto Sans TC",sans-serif;
  background:#f1f8e9;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 標題 */
#header{
  width:100%;
  background:#66bb6a;
  color:white;
  text-align:center;
  font-size:1.5rem;
  font-weight:bold;
  padding:14px 0;
}

/* 容器 */
#tipsContainer{
  margin-top:20px;
  width:95%;
  max-width:900px;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

/* 卡片 */
.flip-card{
  width:220px;
  height:300px;
  perspective:1000px;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transition:transform .6s;
  transform-style:preserve-3d;
}

.flip-inner.active{
  transform:rotateY(180deg);
}

/* 正反面 */
.flip-front,.flip-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:16px;
  backface-visibility:hidden;
  box-shadow:0 6px 15px rgba(0,0,0,.15);
  overflow:hidden;
}

/* 正面（圖片＋標題） */
.flip-front{
  background:white;
  display:flex;
  flex-direction:column;
}

.flip-front img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  background:#f5f5f5;
  padding:10px;
}

.flip-front h3{
  text-align:center;
  padding:10px;
  color:#2e7d32;
}

/* 背面（說明） */
.flip-back{
  background:#ffffff;
  transform:rotateY(180deg);
  padding:15px;
  display:flex;
  align-items:center;
  text-align:center;
  color:#33691e;
  line-height:1.5;
}

/* 返回 */
#backHome{
  margin:30px;
  background:#66bb6a;
  color:white;
  border:none;
  padding:12px 30px;
  border-radius:25px;
  font-size:1rem;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="header">🌱 垃圾減量小技巧（點擊卡片）</div>

<div id="tipsContainer">

<!-- 卡片1 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/餐具.png">
      <h3>自備餐具</h3>
    </div>
    <div class="flip-back">
     用餐時自備筷子、湯匙與餐盒，可大幅減少一次性餐具的使用。
    </div>
  </div>
</div>

<!-- 卡片2 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/環保杯.png">
      <h3>自備飲料杯</h3>
    </div>
    <div class="flip-back">
     購買飲料可自備環保杯，多數飲料店還會提供折扣，環保又省錢！
    </div>
  </div>
</div>

<!-- 卡片3 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/包裝.png">
      <h3>減少過度包裝</h3>
    </div>
    <div class="flip-back">
      選擇簡單包裝商品或自備購物袋，減少不必要的垃圾產生。
    </div>
  </div>
</div>

  <!-- 卡片4 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/一次性.png">
      <h3>避免使用一次性容器</h3>
    </div>
    <div class="flip-back">
    常備可重複使用的餐盒、保鮮盒，外帶時也能拒絕一次性塑膠。
    </div>
  </div>
</div>

  <!-- 卡片5 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/可補充.png">
      <h3>選購可補充式商品</h3>
    </div>
    <div class="flip-back">
     盡量選擇可補充包的清潔用品、洗髮精、沐浴乳，減少塑膠瓶浪費。
    </div>
  </div>
</div>

  <!-- 卡片6 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <img src="model/再利用.png">
      <h3>物品再利用</h3>
    </div>
    <div class="flip-back">
     紙袋、瓶罐、紙箱都可再利用，讓物品的壽命延長。
    </div>
  </div>
</div>

</div>

<button id="backHome" onclick="location.href='index.html'">返回首頁</button>

<script>
// 翻牌
document.querySelectorAll(".flip-card").forEach(card=>{
  card.addEventListener("click",()=>{
    card.querySelector(".flip-inner").classList.toggle("active");
  });
});
</script>

</body>
</html>
