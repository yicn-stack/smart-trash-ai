<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾分類小知識</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Noto Sans TC",sans-serif;
  background:linear-gradient(180deg,#e8f5e9,#c8e6c9);
}

/* 標題 */
#header{
  width:100%;
  background:linear-gradient(135deg,#66bb6a,#43a047);
  color:white;
  text-align:center;
  padding:20px 0;
  font-size:1.6rem;
  font-weight:bold;
  letter-spacing:1px;
  box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

/* 容器 */
.container{
  max-width:1000px;
  margin:30px auto;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

/* 翻牌卡 */
.flip-card{
  width:260px;
  height:340px;
  perspective:1200px;
}

.flip-inner{
  width:100%;
  height:100%;
  position:relative;
  transition:transform .7s ease;
  transform-style:preserve-3d;
}

.flip-inner.active{
  transform:rotateY(180deg);
}

/* 正反面 */
.flip-front,.flip-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  backface-visibility:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  overflow:hidden;
}

/* 正面（升級） */
.flip-front{
  background:linear-gradient(135deg,#a5d6a7,#66bb6a);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:1.2rem;
  text-align:center;
  padding:20px;
  transition:.3s;
}

.flip-card:hover .flip-front{
  transform:scale(1.05);
}

/* 背面 */
.flip-back{
  background:white;
  transform:rotateY(180deg);
  padding:15px;
  font-size:.95rem;
  line-height:1.6;
}

/* 圖片 */
.flip-back img{
  width:100%;
  border-radius:12px;
  margin-bottom:10px;
}

/* 返回按鈕 */
.back-btn{
  display:block;
  margin:40px auto;
  width:200px;
  text-align:center;
  background:linear-gradient(135deg,#66bb6a,#43a047);
  padding:12px;
  color:white;
  border-radius:30px;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 6px 15px rgba(0,0,0,.2);
  transition:.3s;
}

.back-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(0,0,0,.25);
}

</style>
</head>

<body>

<div id="header">🌏 垃圾分類小知識（點擊卡片）</div>

<div class="container">

<!-- 塑膠 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      <h2>♻️ 塑膠類</h2><br><br>
      <h4👉 點擊查看></h4>
    </div>
    <div class="flip-back">
      <img src="model/a1.png" width="800">
      ✔ 清洗乾淨<br>
      ✔ 壓扁回收<br>
      ✔ 油污需清洗<br>
      <br>
      🌍 正確分類可減少污染
    </div>
  </div>
</div>

<!-- 紙類 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      🧻 紙類<br><br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 保持乾燥<br>
      ✔ 撕除膠帶<br>
      ✔ 衛生紙不可回收
    </div>
  </div>
</div>

<!-- 金屬 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      🥫 金屬類<br><br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 清洗乾淨<br>
      ✔ 壓扁節省空間<br>
      ✔ 分開丟棄
    </div>
  </div>
</div>

<!-- 玻璃 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      🍾 玻璃類<br><br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 拿掉瓶蓋<br>
      ✔ 破碎需包好<br>
      ✔ 分類顏色
    </div>
  </div>
</div>

<!-- 紙餐具 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      🍱 紙餐具<br><br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 無油可回收<br>
      ✔ 油污需清洗<br>
      ✔ 杯套可回收
    </div>
  </div>
</div>

<!-- 有害 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      ☠️ 有害垃圾<br><br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 交回收箱<br>
      ✔ 電池不可亂丟<br>
      ✔ 打火機清空
    </div>
  </div>
</div>

</div>

<a href="index.html" class="back-btn">返回分類系統</a>

<script>
document.querySelectorAll(".flip-card").forEach(card=>{
  card.addEventListener("click",()=>{
    card.querySelector(".flip-inner").classList.toggle("active");
  });
});
</script>

</body>
</html>
