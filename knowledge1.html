<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾分類小知識</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: "Noto Sans TC", sans-serif;
  background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
}

/* 標題 */
#header {
  width: 100%;
  background: #2e7d32;
  color: white;
  text-align: center;
  padding: 18px 0;
  font-size: 1.8rem;
  font-weight: bold;
}

/* 容器 */
.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

/* 翻牌卡 */
.flip-card {
  width: 260px;
  height: 340px;
  margin: 15px;
  perspective: 1000px;
  cursor: pointer;
}

.flip-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transition: transform 0.8s;
  transform-style: preserve-3d;
}

.flip-inner.active {
  transform: rotateY(180deg);
}

/* 正反面 */
.flip-front, .flip-back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 16px;
  box-shadow: 0 5px 15px rgba(0,0,0,.2);
  backface-visibility: hidden;
}

/* 正面 */
.flip-front {
  background: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #2e7d32;
  font-weight: bold;
  text-align: center;
  padding: 15px;
}

/* 背面 */
.flip-back {
  background: white;
  transform: rotateY(180deg);
  padding: 15px;
  overflow-y: auto;
}

.flip-back img {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* 返回 */
.back-btn {
  display: block;
  margin: 30px auto;
  text-align: center;
  background: #2e7d32;
  padding: 12px 28px;
  color: white;
  border-radius: 30px;
  text-decoration: none;
}
</style>
</head>

<body>

<div id="header">垃圾分類小知識（點擊卡片查看）</div>

<div class="container">

<!-- 塑膠 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      ♻️ 塑膠類<br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      <img src="model/a1.png">
      ✔ 清洗乾淨<br>
      ✔ 壓扁回收<br>
      ✔ 油污需清洗
    </div>
  </div>
</div>

<!-- 紙類 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      🧻 紙類<br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 保持乾燥<br>
      ✔ 撕除膠帶<br>
      ✔ 衛生紙不可回收
    </div>
  </div>
</div>

<!-- 金屬 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      🥫 金屬類<br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 清洗乾淨<br>
      ✔ 壓扁節省空間<br>
      ✔ 分開丟棄
    </div>
  </div>
</div>

<!-- 玻璃 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      🍾 玻璃類<br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 拿掉瓶蓋<br>
      ✔ 破碎需包好<br>
      ✔ 分類顏色
    </div>
  </div>
</div>

<!-- 紙餐具 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      🍱 紙餐具<br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 無油可回收<br>
      ✔ 油污需清洗<br>
      ✔ 杯套可回收
    </div>
  </div>
</div>

<!-- 有害 -->
<div class="flip-card">
  <div class="flip-inner">
    <div class="flip-front">
      ☠️ 有害垃圾<br>
      👉 點擊查看
    </div>
    <div class="flip-back">
      ✔ 交回收箱<br>
      ✔ 電池不可亂丟<br>
      ✔ 打火機清空
    </div>
  </div>
</div>

</div>

<a href="index.html" class="back-btn">返回分類系統</a>

<script>
document.querySelectorAll(".flip-card").forEach(card=>{
  card.addEventListener("click",()=>{
    card.querySelector(".flip-inner").classList.toggle("active");
  });
});
</script>

</body>
</html>
