<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾知識推廣</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Noto Sans TC";
  background:#e8f5e9;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px;
}

/* 標題 */
h2{
  margin-bottom:20px;
  color:#2e7d32;
}

/* 卡片 */
.card{
  width:340px;
  background:white;
  border-radius:20px;
  margin:15px 0;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,.15);
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px) scale(1.02);
}

/* 圖片 */
.card img{
  width:100%;
  aspect-ratio:1/1;     
  object-fit:contain;   /
  background:#f5f5f5;
  padding:15px;
}

/* 內容 */
.card-content{
  padding:15px;
  text-align:center;
}

.card h3{
  color:#2e7d32;
  margin-bottom:8px;
}

.card p{
  color:#555;
  font-size:0.95rem;
  line-height:1.5;
}

/* 回首頁 */
.back-btn{
  margin-top:25px;
  background:#66bb6a;
  padding:12px 30px;
  border-radius:25px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 5px 12px rgba(0,0,0,.2);
}

.back-btn:hover{
  transform:translateY(-3px);
}

</style>
</head>

<body>

<h2>垃圾知識推廣</h2>

<!-- 卡片1 -->
<div class="card" onclick="location.href='knowledge1.html'">

  <img src="model/知識.png" alt="分類小知識">

  <div class="card-content">
    <h3>♻️ 分類小知識</h3>
    <p>你知道在做垃圾分類時需要注意哪些小細節嗎？</p>
  </div>

</div>

<!-- 卡片2 -->
<div class="card" onclick="location.href='reduce.html'">

  <img src="model/減量.png" alt="垃圾減量">

  <div class="card-content">
    <h3>🌱 垃圾減量 TIPS</h3>
    <p>你知道生活中有哪些方式可以減少垃圾的產生嗎？</p>
  </div>

</div>

<a href="index.html" class="back-btn">回首頁</a>

</body>
</html>
