  <!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>智慧垃圾分類系統｜Smart Trash AI</title>

<meta name="description" content="智慧垃圾分類系統：透過 AI 影像辨識協助判斷紙類、塑膠、金屬、玻璃、紙餐具與一般垃圾。">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:"Noto Sans TC",sans-serif;
background:linear-gradient(180deg,#e8f5e9,#c8e6c9);
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
}

/* 封面 */

#cover{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#d0f8ce,#c8e6c9);
z-index:5;
}

#cover img{
width:220px;
margin-bottom:15px;
filter:drop-shadow(0 6px 10px rgba(0,0,0,0.2));
animation:float 3s ease-in-out infinite;
}

.title{
font-size:2rem;
font-weight:700;
color:#2e7d32;
margin-bottom:4px;
}

.subtitle{
color:#4caf50;
margin-bottom:25px;
}

/* 按鈕 */

.cover-btn{
width:240px;
padding:15px 0;
margin:8px 0;
font-size:1.1rem;
border-radius:30px;
border:none;
cursor:pointer;
transition:.25s;
box-shadow:0 6px 14px rgba(0,0,0,.15);
}

.cover-btn:hover{
transform:translateY(-3px);
}

.primary{
background:linear-gradient(135deg,#66bb6a,#43a047);
color:white;
}

.secondary{
background:white;
color:#388e3c;
border:2px solid #66bb6a;
}

/* 主畫面 */

#main{
width:100%;
max-width:420px;
background:white;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
display:none;
flex-direction:column;
align-items:center;
overflow:hidden;
}

/* header */

#header{
width:100%;
background:#66bb6a;
color:white;
text-align:center;
font-size:1.4rem;
font-weight:700;
padding:14px 0;
}

/* 相機 */

#cameraBox{
margin-top:20px;
background:#fafafa;
padding:18px;
border-radius:18px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

video{
width:280px;
border-radius:12px;
}


/* 拍照按鈕 */

#snap{
margin-top:12px;
width:90px;
height:90px;
border-radius:50%;
background:#66bb6a;
border:6px solid white;
color:white;
font-size:1.2rem;
cursor:pointer;
box-shadow:0 6px 16px rgba(0,0,0,.25);
}

#snap:active{
transform:scale(.85);
}

/* 分類結果 */

#resultCard{
margin-top:18px;
background:white;
border-radius:16px;
padding:16px;
width:85%;
text-align:center;
box-shadow:0 4px 12px rgba(0,0,0,.15);
display:none;
font-weight:600;
}

.recycle{border-left:8px solid #66bb6a;}
.trash{border-left:8px solid #9e9e9e;}
.hazard{border-left:8px solid #e57373;}

/* 小提示 */

#tip{
margin-top:10px;
background:#f1f8e9;
border-left:6px solid #66bb6a;
padding:12px;
border-radius:12px;
width:85%;
display:none;
font-size:.9rem;
color:#33691e;
}

/* 回首頁 */

#backHome{
margin:16px 0 20px;
background:#e8f5e9;
color:#2e7d32;
padding:10px 26px;
border-radius:20px;
border:none;
font-weight:600;
cursor:pointer;
}

#backHome:hover{
background:#c8e6c9;
}

/* 動畫 */

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-8px);}
}

</style>
</head>

<body>

<!-- 封面 -->

<div id="cover">

<img src="model/LOGO.png">

<div class="title">GreenSort</div>
<div class="subtitle">AI智慧垃圾分類學習平台</div>

<button class="cover-btn primary" onclick="enterSystem()">辨識系統</button>

<button class="cover-btn secondary" onclick="location.href='knowledge.html'">
垃圾知識推廣
</button>

<button class="cover-btn secondary" onclick="location.href='games.html'">
垃圾分類小遊戲
</button>

<button class="cover-btn secondary" onclick="location.href='animation.html'">
環保動畫
</button>


</div>

<!-- 主畫面 -->

<div id="main">

<div id="header">🌏 智慧垃圾分類系統</div>

<div id="cameraBox">

<video id="video" autoplay playsinline muted></video>

<button id="snap" disabled>拍照</button>

</div>

<div id="resultCard"></div>

<div id="tip"></div>

<button id="backHome" onclick="goHome()">回首頁</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image/dist/teachablemachine-image.min.js"></script>

<script>

const video=document.getElementById('video')
const snapBtn=document.getElementById('snap')
const cover=document.getElementById('cover')
const main=document.getElementById('main')
const resultCard=document.getElementById('resultCard')
const tipBox=document.getElementById('tip')

let model
let currentStream=null

async function enterSystem(){

cover.style.display="none"
main.style.display="flex"

loadCameraAndModel()

}

function goHome(){

stopCamera()

main.style.display="none"
cover.style.display="flex"

}

function stopCamera(){

if(currentStream){

currentStream.getTracks().forEach(t=>t.stop())
currentStream=null

}

}

async function loadCameraAndModel(){

try{

currentStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})

video.srcObject=currentStream

}catch(err){

alert("無法開啟相機")

return

}

resultCard.style.display="block"
resultCard.innerText="模型載入中..."

const modelURL="./model/model.json"
const metadataURL="./model/metadata.json"

model=await window.tmImage.load(modelURL,metadataURL)

snapBtn.disabled=false
resultCard.innerText="可以開始辨識垃圾！"

}

const tips={
"塑膠類":"💡 容器類記得先倒掉液體再回收！",
"紙類":"💡 紙張保持乾燥，避免油污。",
"金屬類":"💡 壓扁鋁罐可節省回收空間。",
"玻璃類":"💡 破玻璃請包好避免割傷。",
"紙餐具":"💡 餐盒請沖洗乾淨再丟棄。",
"一般垃圾":"💡 確認無可回收部分再丟棄。",
"有害垃圾":"☠️ 電池燈管需特別回收，請勿隨意丟棄。"
}

snapBtn.addEventListener("click",async()=>{

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const ctx=canvas.getContext("2d")

ctx.drawImage(video,0,0)

const prediction=await model.predict(canvas)

let best=prediction[0]

prediction.forEach(p=>{
if(p.probability>best.probability)best=p
})

let cssClass="trash"
let icon="🗑️"

if(best.className.includes("回收")){
cssClass="recycle"
icon="♻️"
}else if(best.className.includes("有害")){
cssClass="hazard"
icon="☠️"
}

resultCard.className=cssClass
resultCard.style.display="block"

resultCard.innerHTML=`${icon}<br><b>${best.className}</b><br>${(best.probability*100).toFixed(2)}%`

for(let key in tips){

if(best.className.includes(key)){
tipBox.innerText=tips[key]
tipBox.style.display="block"
}

}

})

</script>

</body>
</html>
