<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾分類小遊戲</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Noto Sans TC";
  background:linear-gradient(180deg,#e8f5e9,#c8e6c9);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 15px;
}

/* 標題 */
h2{
  margin-bottom:20px;
  color:#2e7d32;
}

/* 容器（左右排列） */
.game-container{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:800px;
}

/* 遊戲卡片 */
.game-card{
  width:180px;
  background:white;
  border-radius:20px;
  overflow:hidden;
  text-decoration:none;
  color:black;
  box-shadow:0 8px 20px rgba(0,0,0,.2);
  transition:.3s;
}

.game-card:hover{
  transform:translateY(-6px) scale(1.03);
}

/* 圖片 */
.game-card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

/* 遊戲名稱 */
.game-title{
  padding:12px;
  font-weight:bold;
  text-align:center;
  color:#2e7d32;
}

/* 回首頁 */
.back-btn{
  margin-top:30px;
  background:#66bb6a;
  padding:12px 30px;
  border-radius:25px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 5px 12px rgba(0,0,0,.2);
  transition:.3s;
}

.back-btn:hover{
  transform:translateY(-3px);
}

</style>
</head>

<body>

<h2>🎮 選擇遊戲</h2>

<div class="game-container">

  <!-- 遊戲1 -->
  <a class="game-card" href="https://你的遊戲1連結">
    <img src="model/game1.png" alt="遊戲1">
    <div class="game-title">垃圾分類挑戰</div>
  </a>

  <!-- 遊戲2 -->
  <a class="game-card" href="https://new.playreal.city?openExternalBrowser=1&serialNumber=AMQKJAPXEOBB">
    <img src="model/game2.png" alt="遊戲2">
    <div class="game-title">一個垃圾兩個世界</div>
  </a>

</div>

<a href="index.html" class="back-btn">回首頁</a>

</body>
</html>
