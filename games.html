<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>垃圾分類小遊戲</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:"Noto Sans TC";
  background:#e8f5e9; /* 單一顏色 */
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
}

/* 標題 */
h2{
  margin-bottom:30px;
  color:#2e7d32;
  font-size:1.8rem;
}

/* 容器 */
.game-container{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:900px;
}

/* 卡片（放大） */
.game-card{
  width:260px;           
  background:white;
  border-radius:24px;
  overflow:hidden;
  text-decoration:none;
  color:black;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
  transition:.3s;
}

.game-card:hover{
  transform:translateY(-8px) scale(1.05);
}

/* 圖片（放大） */
.game-card img{
  width:100%;
  aspect-ratio:1/1;   
  object-fit:contain; 
  background:#f5f5f5; 
  padding:10px;       
}

/* 標題（放大） */
.game-title{
  padding:16px;
  font-weight:bold;
  text-align:center;
  color:#2e7d32;
  font-size:1.2rem;
}

/* 回首頁 */
.back-btn{
  margin-top:40px;
  background:#66bb6a;
  padding:14px 40px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  font-size:1.1rem;
  box-shadow:0 6px 15px rgba(0,0,0,.2);
  transition:.3s;
}

.back-btn:hover{
  transform:translateY(-3px);
}

</style>
</head>

<body>

<h2>🎮 選擇遊戲</h2>

<div class="game-container">

  <!-- 遊戲1 -->
  <a class="game-card" href="https://yaz-game-cyber.github.io/game//game/index.html">
    <img src="model/game1.png" alt="遊戲1">
    <div class="game-title">垃圾分類挑戰</div>
  </a>

  <!-- 遊戲2 -->
  <a class="game-card" href="https://new.playreal.city?openExternalBrowser=1&serialNumber=AMQKJAPXEOBB">
    <img src="model/game2.png" alt="遊戲2">
    <div class="game-title">一個垃圾兩個世界</div>
  </a>

</div>

<a href="index.html" class="back-btn">回首頁</a>

</body>
</html>
